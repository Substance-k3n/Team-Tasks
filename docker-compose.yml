version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team_tasks_api
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: team_tasks_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: team_tasks_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: team_tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NewStrongPassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: team_tasks_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
